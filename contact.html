<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Phones</title>
  <link rel="stylesheet" href="styles/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink:wght@100..900&family=Delius&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="container">
      <img src="images/logo.png" alt="Circle Phones logo">
      <h1>Circle Phones</h1>
    </div>
    <nav>
      <div class="links">
        <a href="index.html">Home</a>
        <a href="contact.html">Contact Us</a>
      </div>
    </nav>
  </header>
  <main>
    <form action="/contact.html">
      <div class="textbox">
        <label>Your Name:</label>
        <input type="text">
      </div>
      <div class="textbox">
        <label>Your Email:</label>
        <input type="text" >
      </div>
      <div class="textbox">
        <label>Message:</label>
        <textarea type="text" placeholder="Your Message.." rows="7" cols="33"></textarea>
      </div>
      <input type="submit" class="submit_button">
    </form>
  </main>
  <footer>
    <p>Created by mjmi29</p>
    <p>Follow us on </p>
    <div class="socials">
      <nav>
        <a href="#">Facebook</a>
        <a href="#">Twitter</a>
        <a href="#">Instagram</a>
      </nav>
    </div>
  </footer>
